server:
  port: 8080
spring:
  cloud:
    gateway:
      default-filters:
        - name: JwtAuthenticationFilter
        - RemoveRequestHeader=Cookie
        - AddResponseHeader=X-Response-Generated-By, RevWorkforce-Gateway
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**
        - id: auth-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/auth/**
        - id: employee-service
          uri: lb://EMPLOYEE-SERVICE
          predicates:
            - Path=/employees/**,/departments/**,/designations/**
        - id: leave-service
          uri: lb://LEAVE-SERVICE
          predicates:
            - Path=/api/leaves/**
        - id: performance-service
          uri: lb://PERFORMANCE-SERVICE
          predicates:
            - Path=/api/performance/**
        - id: reporting-service
          uri: lb://REPORTING-SERVICE
          predicates:
            - Path=/api/reports/**
        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: revworkforce-super-secure-jwt-secret-key-256-bit-required-2026

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.revworkforce: DEBUG
