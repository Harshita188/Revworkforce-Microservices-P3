spring:
  datasource:
    url: jdbc:mysql://localhost:3306/performance_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
jwt:
  secret: revworkforce-super-secure-jwt-secret-key-256-bit-required-2026
logging:
  level:
    com.revworkforce: DEBUG
