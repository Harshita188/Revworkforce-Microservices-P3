server:
  port: 8084
spring:
  application:
    name: performance-service
  # config:
  #   import: "optional:configserver:http://localhost:8888"
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/revworkforce_performance
    username: root
    password: Hysqlpassword1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
jwt:
  secret: revworkforce-super-secure-jwt-secret-key-256-bit-required-2026
  expiration: 86400000
